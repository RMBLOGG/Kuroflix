name: Build Kuroflix APK (testing)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Kuroflix-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Build Perf APK (release-optimized, buat testing performa)
        run: gradle assemblePerf --no-daemon

      - name: Upload Perf APK
        uses: actions/upload-artifact@v4
        with:
          name: Kuroflix-perf
          path: app/build/outputs/apk/perf/*.apk
          retention-days: 7
